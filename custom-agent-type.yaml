apiVersion: bindplane.observiq.com/v1
kind: AgentType
metadata:
  name: simons-custom-otel-distro
  displayName: Simon's custom OTel distro
  description: A custom OTel distro built with Dynatrace and Bindplane components.
spec:
  repositoryLink: https://github.com/user/custom-collector
  platformArchSet:
    - platform: darwin
      arch: arm64
    - platform: linux
      arch: amd64
    - platform: linux
      arch: arm64
    - platform: windows
      arch: amd64
